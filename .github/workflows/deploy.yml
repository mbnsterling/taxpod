name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ─── CI: lint, typecheck, build ───────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # - name: Install dependencies
      #   run: npm ci

      # - name: Lint
      #   run: npm run lint

      # - name: Typecheck
      #   run: npm run typecheck

      # - name: Build (with SKIP_ENV_VALIDATION)
      #   run: SKIP_ENV_VALIDATION=1 npm run build

      - name: Log in to GitHub Container Registry
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image for TaxPod
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL} \
            -t ghcr.io/${{ github.repository_owner }}/taxpod:latest .

      - name: Push Docker image to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/taxpod:latest

  # ─── Deploy: SSH into droplet and run docker-compose ──────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy nginx config to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          source: deploy/nginx/conf.d/default.conf
          target: /var/www/taxpod/
          strip_components: 0

      - name: Deploy to DigitalOcean droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /var/www/taxpod

            # Log in to GitHub Container Registry so the droplet can pull the image built in CI
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            # Pull latest images (app from GHCR, nginx/certbot from Docker Hub)
            docker compose pull

            # Run Prisma migrations using the app image and production env
            docker compose run --rm app node node_modules/.bin/prisma migrate deploy

            # Recreate containers with new images
            docker compose up -d --remove-orphans

            # Remove dangling images to free disk space
            docker image prune -f
