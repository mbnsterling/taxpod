name: CI / Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/taxpod:latest
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Create nginx config
        run: |
          mkdir -p deploy/nginx/conf.d
          cat > deploy/nginx/conf.d/default.conf << 'EOF'
          server {
              listen 80;
              server_name _;

              location /.well-known/acme-challenge/ {
                  root /var/www/certbot;
              }

              location / {
                  return 301 https://$host$request_uri;
              }
          }

          server {
              listen 443 ssl;
              server_name taxpod.ng www.taxpod.ng;

              ssl_certificate     /etc/letsencrypt/live/taxpod.ng/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/taxpod.ng/privkey.pem;

              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_prefer_server_ciphers off;
              ssl_session_cache shared:SSL:10m;
              ssl_session_timeout 1d;
              add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

              location / {
                  proxy_pass         http://app:3000;
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection 'upgrade';
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 90s;
              }
          }
          EOF

      - name: Ensure target directory exists on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: mkdir -p /var/www/taxpod/deploy/nginx/conf.d /var/www/taxpod/data/certbot/conf /var/www/taxpod/data/certbot/www

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,deploy/nginx/conf.d/default.conf"
          target: /var/www/taxpod/
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/taxpod

            # Log in to GHCR so the server can pull the image
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            # Pull the freshly built image
            docker compose pull

            # Run Prisma migrations
            docker compose run --rm app node node_modules/.bin/prisma migrate deploy

            # Restart the stack
            docker compose up -d --remove-orphans

            # Prune old images
            docker image prune -f
