name: CI / Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/taxpod

permissions:
  contents: read
  packages: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug image info
        run: |
          echo "Repository owner : ${{ github.repository_owner }}"
          echo "Full image        : ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "SHA tag           : ${{ github.sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          provenance: false

      - name: Verify image was pushed
        run: |
          echo "Verifying ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest ..."
          if docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest; then
            echo "Image verified successfully"
          else
            echo "Image not found in registry — aborting"
            exit 1
          fi

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -Eeuo pipefail
            cd /var/www/taxpod

            REGISTRY="${{ env.REGISTRY }}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
            OWNER="${{ github.repository_owner }}"

            # Authenticate to GHCR using the workflow's GITHUB_TOKEN.
            # All ${{ }} expressions are resolved on the Actions runner before
            # the script is sent over SSH, so the token value arrives as a
            # plain string. Writing directly to docker config avoids docker
            # login TTY requirements in non-interactive SSH sessions.
            GHCR_AUTH=$(printf '%s:%s' "${{ github.actor }}" "${{ secrets.GITHUB_TOKEN }}" | base64 -w0)
            mkdir -p ~/.docker
            printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' "$GHCR_AUTH" > ~/.docker/config.json

            # Stop only the app to free memory before pulling the new image
            docker compose stop app

            # Prune stopped containers and dangling images before pulling
            docker container prune -f
            docker image prune -f

            # Pull the new image (and any updated nginx/certbot images)
            echo "Pulling $IMAGE:latest ..."
            if ! docker pull "$IMAGE:latest"; then
              echo "Failed to pull image — aborting deployment"
              exit 1
            fi

            # ── Migrations ──────────────────────────────────────────────────────
            # Run in the app container (distroless image; must use node directly)
            # Runs BEFORE starting the app so a failed migration aborts deployment
            echo "Running database migrations ..."
            if docker compose run --rm app node node_modules/.bin/prisma migrate deploy; then
              echo "Migrations completed successfully"
            else
              MIGRATION_EXIT=$?
              echo "ERROR: Migrations failed (exit $MIGRATION_EXIT) — aborting deployment"
              exit "$MIGRATION_EXIT"
            fi

            # ── Restart ──────────────────────────────────────────────────────────
            docker compose up -d --remove-orphans

            # Brief log snapshot after restart
            echo "Container status:"
            docker compose ps app
            echo "Recent app logs:"
            docker compose logs --tail=20 app

            # Wait for the container to stabilise
            sleep 10

            if docker compose ps app | grep -q "Up"; then
              echo "Container is running"
            else
              echo "Container failed to start — check logs above"
              docker compose logs --tail=50 app
              exit 1
            fi

            # ── HTTP health check ────────────────────────────────────────────────
            echo "Waiting for application to become healthy ..."
            HEALTH_URL="https://taxpod.ng/api/health"
            MAX_RETRIES=12
            RETRY_INTERVAL=10

            for i in $(seq 1 $MAX_RETRIES); do
              STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$HEALTH_URL" || true)
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (attempt $i)"
                break
              fi
              echo "Attempt $i/$MAX_RETRIES — got HTTP $STATUS, retrying in ${RETRY_INTERVAL}s ..."
              if [ "$i" -eq "$MAX_RETRIES" ]; then
                echo "Health check failed after $MAX_RETRIES attempts — check application logs"
                docker compose logs --tail=50 app
                exit 1
              fi
              sleep "$RETRY_INTERVAL"
            done

            # Final cleanup of images no longer referenced by any container
            docker image prune -f

            echo "Production deployment completed successfully!"

      - name: Summarise deployment
        run: |
          echo "Deployment to production completed."
          echo "Application: https://taxpod.ng"
          echo "Image SHA  : ${{ github.sha }}"
