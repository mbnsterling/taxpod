name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ─── CI: lint, typecheck, build ───────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # - name: Install dependencies
      #   run: npm ci

      # - name: Lint
      #   run: npm run lint

      # - name: Typecheck
      #   run: npm run typecheck

      # - name: Build (with SKIP_ENV_VALIDATION)
      #   run: SKIP_ENV_VALIDATION=1 npm run build

      - name: Log in to GitHub Container Registry
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image for TaxPod
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL} \
            -t ghcr.io/${{ github.repository_owner }}/taxpod:latest .

      - name: Push Docker image to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/taxpod:latest

  # ─── Deploy: SSH into droplet and run docker-compose ──────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to DigitalOcean droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
        env:
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          script: |
            set -e

            cd /var/www/taxpod

            # Ensure nginx config directory exists
            mkdir -p deploy/nginx/conf.d

            # Write nginx default.conf from repo-defined configuration so it stays in sync with deployments
            cat <<'EOF' > deploy/nginx/conf.d/default.conf
              server {
                  listen 80;
                  server_name _;

                  # Certbot HTTP-01 challenge
                  location /.well-known/acme-challenge/ {
                      root /var/www/certbot;
                  }

                  # Redirect all other HTTP traffic to HTTPS
                  location / {
                      return 301 https://$host$request_uri;
                  }
              }

              server {
                  listen 443 ssl;
                  server_name taxpod.ng www.taxpod.ng;

                  ssl_certificate     /etc/letsencrypt/live/taxpod.ng/fullchain.pem;
                  ssl_certificate_key /etc/letsencrypt/live/taxpod.ng/privkey.pem;

                  # Modern SSL settings
                  ssl_protocols TLSv1.2 TLSv1.3;
                  ssl_prefer_server_ciphers off;
                  ssl_session_cache shared:SSL:10m;
                  ssl_session_timeout 1d;
                  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

                  # Proxy to Next.js app container
                  location / {
                      proxy_pass         http://app:3000;
                      proxy_http_version 1.1;
                      proxy_set_header   Upgrade $http_upgrade;
                      proxy_set_header   Connection 'upgrade';
                      proxy_set_header   Host $host;
                      proxy_set_header   X-Real-IP $remote_addr;
                      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header   X-Forwarded-Proto $scheme;
                      proxy_cache_bypass $http_upgrade;
                      proxy_read_timeout 90s;
                  }
              }
              EOF

            # Log in to GitHub Container Registry on the droplet so it can pull private images
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            # Pull latest images (app from GHCR, nginx/certbot from Docker Hub)
            docker compose pull

            # Run Prisma migrations using the app image and production env
            docker compose run --rm app node node_modules/.bin/prisma migrate deploy

            # Recreate containers with new images
            docker compose up -d --remove-orphans

            # Remove dangling images to free disk space
            docker image prune -f
